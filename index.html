<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Tracker</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Our CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header with Dark Mode Toggle -->
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h1>💰 Smart Budget Tracker</h1>
            <button id="theme-toggle" class="theme-toggle">🌙 Dark Mode</button>
        </div>

        <!-- Add Transaction Form -->
        <div class="form-card">
            <h2>Add New Transaction</h2>
            <form id="transaction-form">
                <input type="text" id="desc" placeholder="Description (e.g. Groceries)" required>
                <input type="number" id="amount" placeholder="Amount" step="0.01" required>
                <select id="type" required>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <select id="category" required>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Bills">Bills</option>
                    <option value="Other">Other</option>
                </select>
                <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="recurring"> Recurring monthly
                </label>
                <button type="submit"><i class="fas fa-plus-circle"></i> Add Transaction</button>
                <button type="button" id="voice-btn" class="voice-btn"><i class="fas fa-microphone"></i> Voice Input</button>
            </form>
        </div>

        <!-- Summary Cards -->
        <div class="summary">
            <div class="card income">
                <h3>Total Income</h3>
                <p id="total-income">₹0.00</p>
            </div>
            <div class="card expense">
                <h3>Total Expenses</h3>
                <p id="total-expense">₹0.00</p>
            </div>
            <div class="card balance">
                <h3>Balance</h3>
                <p id="balance">₹0.00</p>
            </div>
        </div>

        <!-- Insights Section -->
        <div class="insights">
            <h2>🔮 Insights</h2>
            <div id="insight-messages"></div>
        </div>

        <!-- Bill Reminders Widget -->
        <div class="bill-reminders">
            <h2>📅 Upcoming Bills</h2>
            <ul class="bill-list" id="bill-list"></ul>
        </div>

        <!-- Chart and Budget Section -->
        <div class="row">
            <div class="chart-container">
                <h2>Expense Breakdown (This Month)</h2>
                <canvas id="expenseChart"></canvas>
            </div>
            <div class="budget-container">
                <!-- Budget header with Edit button -->
                <div class="budget-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h2>Monthly Budgets</h2>
                    <button id="edit-budgets-btn" class="btn-edit-budgets"><i class="fas fa-pencil-alt"></i> Edit</button>
                </div>
                <!-- Budget progress bars will be injected here -->
                <div id="budget-list"></div>
                <!-- Hidden inline budget edit form -->
                <div id="budget-edit-form" style="display: none; margin-top: 15px; padding: 15px; border-top: 1px solid var(--border-color);">
                    <h3>Set Budget Limits</h3>
                    <div id="budget-inputs"></div>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button id="save-budgets-btn" class="btn-save">Save</button>
                        <button id="cancel-budgets-btn" class="btn-cancel">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transaction List with Export/Import -->
        <div class="transactions">
            <h2>Recent Transactions</h2>
            <button id="export-btn" class="btn-export"><i class="fas fa-download"></i> Export to CSV</button>
            <button id="import-btn" class="btn-import"><i class="fas fa-upload"></i> Import CSV</button>
            <input type="file" id="import-file" accept=".csv" style="display: none;">
            <ul id="transaction-list"></ul>
        </div>
    </div>

    <!-- Our JavaScript -->
    <script src="script.js"></script>
</body>
</html>
